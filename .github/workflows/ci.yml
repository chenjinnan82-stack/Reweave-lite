name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pytest tests -q
      - run: python scripts/run_public_reweave_demo.py --source examples/source_boxes/customer-quote-widget --task "Build a quote summary card" --out /tmp/reweave_public_demo
      - run: test -f /tmp/reweave_public_demo/task_pack.json && test -f /tmp/reweave_public_demo/capsules_used.json && test -f /tmp/reweave_public_demo/provenance.json
      - run: node --check reweave_frontend/app.js
