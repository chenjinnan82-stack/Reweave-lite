name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest tests -q
      - run: python scripts/run_public_reweave_demo.py --source examples/source_boxes/customer-quote-widget --task "Build a quote summary card"
      - name: Check public demo artifacts
        run: |
          python -c "import tempfile; from pathlib import Path; out = Path(tempfile.gettempdir()) / 'reweave_public_demo'; missing = [name for name in ('task_intent.json', 'task_plan.json', 'quality_gate.json', 'task_pack.json', 'capsules_used.json', 'provenance.json', 'snippets_used.json') if not (out / name).is_file()]; raise SystemExit(('missing demo artifacts in %s: %s' % (out, missing)) if missing else 0)"
      - run: python scripts/run_public_stage4_demo.py
      - name: Check Stage4 composition artifacts
        run: |
          python -c "import tempfile; from pathlib import Path; out = Path(tempfile.gettempdir()) / 'reweave_stage4_demo'; missing = [name for name in ('index.html', 'styles.css', 'app.js', 'composition_plan.json', 'adapter_mapping.json', 'task_pack.json', 'capsules_used.json', 'provenance.json', 'quality_gate.json', 'runtime_validation.json') if not (out / name).is_file()]; raise SystemExit(('missing Stage4 demo artifacts in %s: %s' % (out, missing)) if missing else 0)"
      - run: python scripts/run_public_stage4_demo.py --case data
      - run: node --check reweave_frontend/app.js
