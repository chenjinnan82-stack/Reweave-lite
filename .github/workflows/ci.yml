name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest tests -q
      - run: python scripts/run_public_reweave_demo.py --source examples/source_boxes/customer-quote-widget --task "Build a quote summary card"
      - name: Check public demo artifacts
        run: |
          python -c "import tempfile; from pathlib import Path; out = Path(tempfile.gettempdir()) / 'reweave_public_demo'; missing = [name for name in ('task_pack.json', 'capsules_used.json', 'provenance.json', 'snippets_used.json') if not (out / name).is_file()]; raise SystemExit(('missing demo artifacts in %s: %s' % (out, missing)) if missing else 0)"
      - run: node --check reweave_frontend/app.js
