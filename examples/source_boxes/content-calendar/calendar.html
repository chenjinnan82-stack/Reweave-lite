<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Content Calendar</title>
    <link rel="stylesheet" href="calendar.css">
  </head>
  <body>
    <main class="calendar-shell">
      <header>
        <p class="eyebrow">Editorial</p>
        <h1>Launch week calendar</h1>
      </header>
      <section class="calendar-grid">
        <article><strong>Mon</strong><p>Publish launch notes</p></article>
        <article><strong>Wed</strong><p>Ship case study draft</p></article>
        <article><strong>Fri</strong><p>Review newsletter</p></article>
      </section>
      <button id="publishNext">Publish next item</button>
      <p id="calendarStatus">3 items scheduled</p>
    </main>
    <script src="calendar.js"></script>
  </body>
</html>
