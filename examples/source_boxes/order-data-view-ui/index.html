<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regional orders</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Regional orders</h1>
    <table>
      <thead><tr><th>Order</th><th>Region</th><th>Amount</th></tr></thead>
      <tbody id="orders-body" data-record-fields="order,region,amount"></tbody>
    </table>
    <label for="region">Region</label>
    <input id="region" type="text" value="North">
    <button id="filter-orders" type="button">Calculate regional total</button>
    <p>Regional total: <output id="region-total">0</output></p>
  </main>
</body>
</html>
