<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Approval workflow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Approval workflow</h1>
    <label for="approval-status">Current status</label>
    <input id="approval-status" type="text" value="draft">
    <button id="toggle-approval" type="button">Toggle approval</button>
    <p>Next status: <output id="next-status">draft</output></p>
  </main>
</body>
</html>
