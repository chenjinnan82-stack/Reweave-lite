<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Quote Widget</title>
    <link rel="stylesheet" href="quote.css">
  </head>
  <body>
    <main class="quote-shell">
      <section class="quote-card">
        <p class="eyebrow">Quote desk</p>
        <h1>Prepare a customer estimate</h1>
        <label>
          Client name
          <input id="clientName" placeholder="Northstar Studio">
        </label>
        <label>
          Project size
          <select id="projectSize">
            <option value="small">Small refresh</option>
            <option value="growth">Growth package</option>
            <option value="launch">Launch package</option>
          </select>
        </label>
        <button id="quoteButton">Build quote</button>
      </section>
      <aside class="summary-card" id="quoteSummary">
        Select a package to preview pricing.
      </aside>
    </main>
    <script src="quote.js"></script>
  </body>
</html>
